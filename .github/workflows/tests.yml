name: 🧪 Run Data-Driven Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install
      run: pip install selenium pytest pytest-html pandas webdriver-manager requests

    - name: Test
      run: |
        cd "DATA DRIVEN TEST"
        pytest test_data_driven.py -v
